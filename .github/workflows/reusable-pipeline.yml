name: Reusable Java Deployment

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Mediul în care se face deploy (staging/production)"
      image_tag:
        required: true
        type: string
      aws_region:
        required: false
        type: string
        default: "eu-west-1"
    secrets:
      AWS_ROLE_ARN:
        required: true
        description: "OIDC Role ARN din Terraform"

# IMPORTANT: Permisiunile sunt GLOBALE pentru tot fișierul!
permissions:
  id-token: write
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Unit Tests with Maven
        run: mvn clean package -DskipTests=false

  docker-build-push:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}
          audience: sts.amazonaws.com

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image Locally
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: java-dummy-app:temp-scan

      # INSTALAREA EXPLICITĂ A BINARULUI (Versiunea fixată și sigură v0.2.6)
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6

      # SCANAREA PROPRIU-ZISĂ (Folosind binarul instalat anterior)
      - name: Run Trivy vulnerability scanner
        run: |
          trivy image \
            --format table \
            --exit-code 1 \
            --ignore-unfixed \
            --vuln-type os,library \
            --severity CRITICAL,HIGH \
            java-dummy-app:temp-scan

      - name: Build and Push Docker Image to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/java-dummy-app:${{ inputs.image_tag }}
            ${{ steps.login-ecr.outputs.registry }}/java-dummy-app:latest

  deploy-helm:
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}
          audience: sts.amazonaws.com

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --name dev-java-eks --region ${{ inputs.aws_region }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.12.0'

      - name: Deploy with Helm
        run: |
          kubectl create namespace java-app-dev --dry-run=client -o yaml | kubectl apply -f -

          REGISTRY="481665089964.dkr.ecr.eu-west-1.amazonaws.com"

          helm upgrade --install java-app-release ./helm/java-app \
            --namespace java-app-dev \
            --set image.repository=$REGISTRY/java-dummy-app \
            --set image.tag=${{ inputs.image_tag }} \
            --wait --timeout 5m
