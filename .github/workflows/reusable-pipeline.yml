name: Reusable Java Deployment

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Mediul în care se face deploy (staging/production)"
      image_tag:
        required: true
        type: string
      aws_region:
        required: false
        type: string
        default: "eu-west-1"
    secrets:
      AWS_ROLE_ARN:
        required: true
        description: "OIDC Role ARN din Terraform"

permissions:
  id-token: write # CRITICAL pentru OIDC
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # RULAREA UNIT TESTELOR DIRECT PE RUNNER
      - name: Run Unit Tests with Maven
        run: mvn clean package -DskipTests=false

  docker-build-push:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Conectare la AWS folosind OIDC (fără credențiale statice în Github secrets!)
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}
          audience: sts.amazonaws.com
          aws-sts-regional-endpoints: 'global'

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/java-dummy-app:${{ inputs.image_tag }}
            ${{ steps.login-ecr.outputs.registry }}/java-dummy-app:latest

  deploy-helm:
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}
          audience: sts.amazonaws.com

      # Configurăm Kubeconfig pentru EKS local pe runner
      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --name dev-java-eks --region ${{ inputs.aws_region }}

      # Instalăm Helm pe runner
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.12.0'

      # Deploy în Kubernetes cu Helm
      - name: Deploy with Helm
        run: |
          # Ne asigurăm că namespace-ul unde rulează Fargate există
          kubectl create namespace java-app-dev --dry-run=client -o yaml | kubectl apply -f -

          # Luăm URL-ul de ECR dinamic bazat pe login
          REGISTRY="481665089964.dkr.ecr.eu-west-1.amazonaws.com"

          helm upgrade --install java-app-release ./helm/java-app \
            --namespace java-app-dev \
            --set image.repository=$REGISTRY/java-dummy-app \
            --set image.tag=${{ inputs.image_tag }} \
            --wait --timeout 5m
